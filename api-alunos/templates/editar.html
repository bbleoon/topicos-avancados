<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar</title>
</head>
<body>
    <h1>Editar Aluno</h1>

    <form method="POST" action="/atualizar/{{ aluno.id }}">
        <label for="nome">Nome:
            <input type="text" name="nome" id="nome" value="{{ aluno.nome}}" required>
        </label> 

        <label for="idade">Idade:
            <input type="text" name="idade" id="idade" value="{{ aluno.idade }}" required>
        </label>

        <button type="submit">Atualizar</button>
    </form>
</body>
</html>
